{% extends "admin_base.html" %}

{% block admin_content %}
<div class="card-grid" style="grid-template-columns: 1fr; max-width: 600px;">
    <div class="card">
        <h2>Add Faculty</h2>
        <form action="{{ url_for('admin_add_faculty') }}" method="POST">
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" required placeholder="e.g. Dr. Alice">
            </div>
            <div class="form-group">
                <label>Department</label>
                <input type="text" name="department" required placeholder="e.g. Computer Science">
            </div>
            <div class="form-group">
                <label>Main Subject</label>
                <input type="text" name="main_subject" required placeholder="e.g. Data Structures">
            </div>
            <div class="form-group">
                <label>Side Subject</label>
                <input type="text" name="side_subject" placeholder="e.g. Algorithms (Optional)">
            </div>
            <div class="form-group">
                <label>Max Daily Hours</label>
                <input type="number" name="max_hours" required placeholder="4" min="1" max="8">
            </div>
            <button type="submit" class="btn">Add Faculty</button>
        </form>
    </div>

    <div class="card">
        <h2>Add Classroom Requirement</h2>
        <form action="{{ url_for('admin_add_classroom') }}" method="POST">
            <div class="form-group">
                <label>Classroom ID</label>
                <input type="text" name="classroom_id" required placeholder="e.g. CS-Year2-Comp1">
            </div>
            <div class="form-group">
                <label>Subject</label>
                <input type="text" name="subject" required placeholder="e.g. Database Systems">
            </div>
            <div class="form-group">
                <label>Required Hours/Week</label>
                <input type="number" name="required_hours" required placeholder="5" min="1" max="10">
            </div>
            <button type="submit" class="btn">Add Requirement</button>
        </form>
    </div>
</div>
{% endblock %}
