{% extends "admin_base.html" %}

{% block admin_content %}
<div class="card" style="margin-bottom: 30px;">
    <h2>Data Preview (Current Feed)</h2>
    <div class="preview-grid" style="display: grid; grid-template-columns: 1fr; gap: 30px;">
        <div class="preview-section" style="overflow-x: auto;">
            <h3 style="font-size: 14px; margin-bottom: 10px;">Faculty Data</h3>
            {{ faculty_html | safe }}
        </div>
        <div class="preview-section" style="overflow-x: auto;">
            <h3 style="font-size: 14px; margin-bottom: 10px;">Classroom Requirements</h3>
            {{ classroom_html | safe }}
        </div>
    </div>
</div>
{% endblock %}
